name: Publish Zealflow CLI to PyPI

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*.*.*'

jobs:
  pypi-publish:
    name: Build Source & Upload to PyPI
    runs-on: ubuntu-latest
    
    # Required for PyPI Trusted Publishing flow
    permissions:
      id-token: write
      contents: read
      
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      
      - name: Initialize Python Core
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Compile Package Dist
        run: |
          cd cli
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build
      
      - name: Fire Trusted Publish via PyPA
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: cli/dist/
